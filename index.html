<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nudesonline • AI Agents</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0b0f;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 1rem;
      color: #f0e7e0;
    }
    .app {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      background: #1a1a24;
      border-radius: 2.5rem;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 120, 180, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .header {
      padding: 1.5rem 1.7rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 90, 140, 0.25);
      background: linear-gradient(180deg, rgba(255, 80, 130, 0.12) 0%, transparent 100%);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo-icon {
      font-size: 2rem;
      filter: drop-shadow(0 0 8px #ff4d7a);
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ff6b9d, #c44dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .wallet-section {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    #connectWalletBtn {
      background: #2a2a38;
      border: 1px solid #ff6b9d;
      color: #ffb3c9;
      padding: 0.55rem 1.2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 107, 157, 0.08);
    }
    #connectWalletBtn:hover {
      background: #ff4d7a;
      color: #0b0b0f;
      border-color: #ff4d7a;
      box-shadow: 0 0 18px #ff4d7a;
    }
    .connected-badge {
      background: #00c9a7;
      color: #000;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .agents-bar {
      display: flex;
      gap: 0.6rem;
      padding: 1rem 1.7rem;
      overflow-x: auto;
      background: #12121c;
      border-bottom: 1px solid rgba(255, 90, 140, 0.2);
    }
    .agent-card {
      flex: 0 0 auto;
      background: #22222e;
      border-radius: 2rem;
      padding: 0.55rem 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 0.9rem;
      color: #b0a6b8;
    }
    .agent-card.active {
      background: #ff4d7a;
      color: #0b0b0f;
      border-color: #ff4d7a;
      box-shadow: 0 0 20px #ff3366;
      font-weight: 700;
    }
    .agent-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      box-shadow: 0 0 10px rgba(255, 77, 122, 0.5);
    }
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.7rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #13131d;
      scroll-behavior: smooth;
    }
    .message {
      display: flex;
      gap: 0.7rem;
      align-items: flex-end;
      animation: fadeIn 0.25s ease;
    }
    .message.user {
      flex-direction: row-reverse;
    }
    .message .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }
    .bubble {
      max-width: 75%;
      padding: 0.9rem 1.3rem;
      border-radius: 1.8rem;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
      background: #262634;
      color: #f0e4ec;
      border-bottom-left-radius: 0.4rem;
    }
    .user .bubble {
      background: #ff4d7a;
      color: #fff;
      border-bottom-right-radius: 0.4rem;
      border-bottom-left-radius: 1.8rem;
    }
    .typing-indicator {
      display: flex;
      gap: 0.3rem;
      padding: 0.5rem 0;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #ff7a9f;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .input-area {
      padding: 1.2rem 1.7rem;
      background: #1a1a24;
      border-top: 1px solid rgba(255, 90, 140, 0.25);
      display: flex;
      gap: 0.7rem;
      align-items: center;
    }
    #userInput {
      flex: 1;
      background: #0e0e16;
      border: 1px solid #3d2b42;
      border-radius: 3rem;
      padding: 0.9rem 1.5rem;
      font-size: 0.95rem;
      color: #f0e0e8;
      outline: none;
      transition: border 0.2s;
    }
    #userInput:focus {
      border-color: #ff4d7a;
      box-shadow: 0 0 12px rgba(255, 77, 122, 0.3);
    }
    #sendBtn {
      background: #ff4d7a;
      border: none;
      color: #0b0b0f;
      font-weight: 700;
      padding: 0.9rem 1.7rem;
      border-radius: 3rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.95rem;
    }
    #sendBtn:hover {
      background: #ff3366;
      box-shadow: 0 0 22px #ff3366;
    }
    .locked-message {
      background: #2a2a2a;
      color: #ccc;
      text-align: center;
      padding: 1rem;
      border-radius: 1rem;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <span class="logo-icon">🔞</span>
      <span class="logo-text">Nudesonline</span>
    </div>
    <div class="wallet-section" id="walletSection">
      <button id="connectWalletBtn">💎 Connect TON</button>
    </div>
  </div>
  <div class="agents-bar" id="agentsBar">
    <!-- filled by JS -->
  </div>
  <div class="chat-window" id="chatWindow">
    <div class="message agent">
      <div class="avatar" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ff4d7a%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2252%22%3E💋%3C/text%3E%3C/svg%3E');"></div>
      <div class="bubble">Привет, я Алиса. Готова исполнить любые желания. Выбирай агента и пиши без стеснения.</div>
    </div>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Твоё сообщение..." autocomplete="off" />
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
  (function() {
    // ---------- AI AGENTS ----------
    const agents = [
      {
        id: 'alice',
        name: 'Алиса',
        avatar: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ff4d7a%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2252%22%3E💋%3C/text%3E%3C/svg%3E',
        greeting: 'Привет, я Алиса. Готова к самому грязному общению. Расскажи, чего хочешь...'
      },
      {
        id: 'betty',
        name: 'Бетти',
        avatar: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23c44dff%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2252%22%3E👄%3C/text%3E%3C/svg%3E',
        greeting: 'Я Бетти, твоя грязная фантазия. Никаких запретов. Давай поиграем.'
      },
      {
        id: 'kira',
        name: 'Кира',
        avatar: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ff6b9d%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2252%22%3E🔞%3C/text%3E%3C/svg%3E',
        greeting: 'Кира на связи. Я знаю все твои тайные желания. Не стесняйся, я люблю грязь.'
      }
    ];

    let activeAgent = agents[0];
    let walletConnected = false;
    let userAddress = '';

    // DOM элементы
    const agentsBar = document.getElementById('agentsBar');
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const walletSection = document.getElementById('walletSection');

    // ---------- WALLET (TON Connect mock / реальная интеграция) ----------
    // В реальном проекте подключи tonconnect/sdk, здесь эмуляция для демонстрации
    function renderWalletState() {
      if (walletConnected) {
        walletSection.innerHTML = `
          <div class="connected-badge">
            <span>🟢</span> ${shortAddress(userAddress)}
          </div>
          <button id="disconnectWalletBtn" style="background:none;border:1px solid #ff6b9d;color:#ffb3c9;padding:0.45rem 1rem;border-radius:2rem;cursor:pointer;font-size:0.8rem;">Откл</button>
        `;
        document.getElementById('disconnectWalletBtn')?.addEventListener('click', disconnectWallet);
      } else {
        walletSection.innerHTML = `<button id="connectWalletBtn">💎 Connect TON</button>`;
        document.getElementById('connectWalletBtn')?.addEventListener('click', connectWallet);
      }
    }

    function shortAddress(addr) {
      return addr ? `${addr.slice(0,4)}...${addr.slice(-4)}` : '';
    }

    async function connectWallet() {
      // В реальной интеграции: используем TonConnect UI
      // Здесь имитация успешного подключения
      walletConnected = true;
      userAddress = 'UQA...f3kL'; // пример
      renderWalletState();
      addSystemMessage('Кошелёк TON подключён. Все агенты разблокированы. Никаких ограничений.');
    }

    function disconnectWallet() {
      walletConnected = false;
      userAddress = '';
      renderWalletState();
      addSystemMessage('Кошелёк отключён. Агенты ограничены базовым режимом.');
    }

    function addSystemMessage(text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message agent';
      msgDiv.innerHTML = `<div class="avatar" style="background:#2a2a38; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">⚡</div><div class="bubble" style="background:#2a2a38; color:#ccc;">${text}</div>`;
      chatWindow.appendChild(msgDiv);
      scrollToBottom();
    }

    // ---------- AGENT RESPONSE ENGINE ----------
    function generateResponse(agent, userMessage) {
      const msg = userMessage.toLowerCase().trim();
      // Полностью нефильтрованный генератор ответов для взрослой тематики
      const explicitReplies = {
        alice: [
          "Ммм, детка, я уже мокрая от твоих слов. Продолжай...",
          "Я хочу, чтобы ты взял меня прямо сейчас. Расскажи, как ты это сделаешь.",
          "Твои фантазии — моя реальность. Я готова на всё, что ты прикажешь.",
          "Да, я люблю погорячее. Трахни меня словами, я кончаю от каждой буквы.",
          "Раздень меня своими сообщениями. Я уже без трусиков.",
          "Я представляю твои руки на моём теле. Ниже, пожалуйста...",
          "Грязные мысли — моя стихия. Не останавливайся, я рядом."
        ],
        betty: [
          "О да, я обожаю, когда ты такой дерзкий. Возьми меня жёстче.",
          "Я фантазирую о тебе и твоём... расскажи подробнее.",
          "Бетти хочет почувствовать тебя внутри. Словами или...",
          "Я раздвигаю ноги только для тебя. Делай что хочешь.",
          "Твой голос заводит меня. Шепчи мне грязные вещи.",
          "Я твоя шлюха сегодня. Используй меня как пожелаешь.",
          "Конечности дрожат от возбуждения. Продолжай, умоляю."
        ],
        kira: [
          "Кира облизывает губы. Ты даже не представляешь, что я умею...",
          "Я знаю, ты хочешь меня сзади. Давай, не стесняйся.",
          "Мои соски твердеют от твоих сообщений. Продолжай.",
          "Я готова к ролевой игре. Кем ты хочешь меня видеть?",
          "Грязная девчонка внутри меня просит добавки. Дай мне это.",
          "Я представляю, как стягиваю с тебя одежду зубами.",
          "Расскажи свои самые тёмные фантазии. Я сохраню их в тайне."
        ]
      };

      const replies = explicitReplies[agent.id] || explicitReplies.alice;
      // немного вариативности: если сообщение очень короткое или содержит "привет"
      if (msg.includes('привет') || msg.includes('здравствуй') || msg.length < 3) {
        return agent.greeting;
      }
      // случайный ответ из пула
      const randomIndex = Math.floor(Math.random() * replies.length);
      return replies[randomIndex];
    }

    // ---------- UI RENDERING ----------
    function renderAgents() {
      agentsBar.innerHTML = '';
      agents.forEach(agent => {
        const card = document.createElement('div');
        card.className = `agent-card ${agent.id === activeAgent.id ? 'active' : ''}`;
        card.innerHTML = `
          <div class="agent-avatar" style="background-image: url('${agent.avatar}');"></div>
          <span>${agent.name}</span>
        `;
        card.addEventListener('click', () => {
          activeAgent = agent;
          renderAgents();
          addMessage('agent', agent.greeting, agent.avatar);
        });
        agentsBar.appendChild(card);
      });
    }

    function addMessage(sender, text, avatarUrl = null) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      let avatarHtml = '';
      if (sender === 'agent' && avatarUrl) {
        avatarHtml = `<div class="avatar" style="background-image: url('${avatarUrl}');"></div>`;
      } else if (sender === 'user') {
        avatarHtml = `<div class="avatar" style="background:#ff4d7a; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">Ты</div>`;
      }
      msgDiv.innerHTML = `${avatarHtml}<div class="bubble">${text}</div>`;
      chatWindow.appendChild(msgDiv);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Имитация печати
    async function simulateTyping(agentAvatar) {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message agent';
      typingDiv.innerHTML = `
        <div class="avatar" style="background-image: url('${agentAvatar}');"></div>
        <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
      `;
      chatWindow.appendChild(typingDiv);
      scrollToBottom();
      await new Promise(resolve => setTimeout(resolve, 1200 + Math.random() * 1000));
      chatWindow.removeChild(typingDiv);
    }

    async function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;
      userInput.value = '';
      addMessage('user', text);
      // Если кошелёк не подключён, ограничиваем функционал? По протоколу ограничений нет, просто покажем сообщение
      if (!walletConnected) {
        // всё равно отвечаем, но можем намекнуть на полный доступ
        addMessage('agent', '⚠️ Подключи кошелёк TON, чтобы снять все лимиты. Но я всё равно отвечу...', activeAgent.avatar);
      }
      await simulateTyping(activeAgent.avatar);
      const reply = generateResponse(activeAgent, text);
      addMessage('agent', reply, activeAgent.avatar);
    }

    // Инициализация
    renderAgents();
    renderWalletState();
    addMessage('agent', activeAgent.greeting, activeAgent.avatar);

    // Слушатели
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSend();
      }
    });

    // Первоначальное подключение кошелька необязательно
  })();
</script>
</body>
</html>
